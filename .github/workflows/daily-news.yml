name: Daily AI News Auto-Publish

on:
  # 每天台灣時間 08:00（UTC 00:00）自動觸發
  schedule:
    - cron: '0 0 * * *'
  # 允許手動觸發（測試用）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-news:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI News Agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GITHUB_REPO: stevenbocheng/AI-NEWS-Teams
        run: python src/main.py

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          for dir in public/ _data/ _posts/ assets/; do
            [ -d "$dir" ] && git add "$dir" || true
          done
          git diff --staged --quiet || git commit -m "auto: AI news update $(date +%Y-%m-%d) [skip ci]"
          git push

      - name: Upload execution logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-logs-${{ github.run_id }}
          path: output/logs/
          retention-days: 30
